{# rail.html — shared left navigation, included by feed/explore/profile/chat #}
<nav class="rail">
  <div class="rail-logo">
    <span class="brand"><span class="lock-dot">●</span>SX</span>
  </div>
  <div class="rail-nav">
    <a href="{{ url_for('feed_page') }}" class="rail-link {{ 'active' if active=='feed' else '' }}" title="Feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V9.5z"/></svg>
    </a>
    <a href="{{ url_for('explore_page') }}" class="rail-link {{ 'active' if active=='explore' else '' }}" title="Explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </a>
    <a href="{{ url_for('chat_page') }}" class="rail-link {{ 'active' if active=='chat' else '' }}" title="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      <span class="badge-dot" id="chatUnreadDot" style="display:none;"></span>
    </a>
    <a href="#" class="rail-link" id="notifBellBtn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="badge-dot" id="notifUnreadDot" style="display:none;"></span>
    </a>
    <a href="{{ url_for('profile_page', username=username) }}" class="rail-avatar-link {{ 'active' if active=='profile' else '' }}" title="Profile">
      <img src="{{ url_for('uploaded_file', filename=profile_pic) }}" alt="{{ username }}" onerror="this.onerror=null;this.src='/uploads/default.png';">
    </a>
  </div>
  <a href="{{ url_for('logout') }}" class="rail-logout" title="Log out">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
  </a>
</nav>

<div class="dropdown-panel" id="notifPanel">
  <div class="dropdown-panel-header">Notifications</div>
  <div id="followRequestsSection" style="display:none;">
    <div class="dropdown-panel-subheader">Follow requests</div>
    <div id="followRequestsList"></div>
  </div>
  <div id="notifList"></div>
</div>
